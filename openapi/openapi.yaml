# yaml-language-server: $schema=https://spec.openapis.org/oas/3.1/schema/2022-10-07

openapi: 3.1.0
info:
  title: MSG Shooting Target System REST API
  version: 1.0.0
  license:
    name: MIT
    identifier: MIT
  description: |
    This is the REST API for the MSG Shooting Target System, which allows users to manage shooting programs,
    audio files, and target visibility. The API provides endpoints for uploading programs, managing series and

servers:
  - url: http://localhost:8080/api/v1
    description: Base URL for version 1 of the API

paths:
  /programs:
    get:
      summary: List all programs
      operationId: listPrograms
      responses:
        "200":
          description: List of available programs with ID, title, and description
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    title:
                      type: string
                    description:
                      type: string
                    readonly:
                      type: boolean
        "400":
          description: Bad request

    post:
      summary: Upload a new program
      operationId: uploadProgram
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgramUpload"
      responses:
        "201":
          description: Program uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
        "400":
          description: Invalid program structure

  /programs/{id}:
    get:
      summary: Get a specific program
      operationId: getProgram
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Program found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Program"
        "404":
          description: Program not found
        "400":
          description: Invalid ID

  /programs/{id}/load:
    post:
      summary: Load a specific program
      operationId: loadProgram
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Program loaded
        "404":
          description: Program ID not found
        "400":
          description: Invalid ID

  /programs/start:
    post:
      summary: Start next series
      operationId: startNextSeries
      responses:
        "200":
          description: Series started
        "400":
          description: No program loaded

  /programs/stop:
    post:
      summary: Stop current series
      operationId: stopCurrentSeries
      responses:
        "200":
          description: Series stopped
        "400":
          description: No program loaded or no program running

  /programs/series/{series_index}/skip_to:
    post:
      summary: Skip to a specific series in the program
      operationId: skipToSeries
      parameters:
        - in: path
          name: series_index
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Skipped to the specified series
        "400":
          description: No program loaded or invalid series index

  /programs/{id}/delete:
    delete:
      summary: Delete a program by ID
      operationId: deleteProgram
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Program deleted successfully
        "404":
          description: Program not found
        "400":
          description: Invalid ID

  /status:
    get:
      summary: Get current program and target status
      operationId: getStatus
      responses:
        "200":
          description: Current program and target state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgramStatus"
        "400":
          description: Bad request

  /audios:
    get:
      summary: List all audios
      operationId: listAudios
      responses:
        "200":
          description: Built-in and uploaded audio files
          content:
            application/json:
              schema:
                type: object
                properties:
                  audios:
                    type: array
                    items:
                      $ref: "#/components/schemas/Audio"
        "400":
          description: Bad request

    post:
      summary: Upload a new audio file
      operationId: uploadAudio
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - codec
                - title
              properties:
                file:
                  type: string
                  format: binary
                codec:
                  type: string
                  enum: [pcm, mp3]
                title:
                  type: string
      responses:
        "201":
          description: Audio uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
        "415":
          description: Unsupported Media Type — invalid audio format
        "400":
          description: Invalid audio upload

  /audios/{id}/delete:
    delete:
      summary: Delete an audio file by ID
      operationId: deleteAudio
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Audio deleted successfully
        "404":
          description: Audio not found
        "400":
          description: Invalid ID

  /targets/show:
    post:
      summary: Show the target
      operationId: showTarget
      responses:
        "200":
          description: Target is now shown
        "400":
          description: Bad request

  /targets/hide:
    post:
      summary: Hide the target
      operationId: hideTarget
      responses:
        "200":
          description: Target is now hidden
        "400":
          description: Bad request

  /targets/toggle:
    post:
      summary: Toggle the target visibility
      operationId: toggleTarget
      responses:
        "200":
          description: Target visibility toggled
        "400":
          description: Bad request
components:
  schemas:
    Audio:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        readonly:
          type: boolean

    Program:
      type: object
      required:
        - id
        - title
        - description
        - readonly
        - series
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        readonly:
          type: boolean
        series:
          type: array
          items:
            $ref: "#/components/schemas/Series"

    Series:
      type: object
      required:
        - name
        - optional
        - events
      properties:
        name:
          type: string
        optional:
          type: boolean
          default: false
        events:
          type: array
          items:
            $ref: "#/components/schemas/Event"

    Event:
      type: object
      required:
        - duration
      properties:
        duration:
          type: integer
          description: |
            Duration of the event in tenths of a second.
            For example: 1 = 0.1s, 2 = 0.2s, ..., 10 = 1.0s
        command:
          type: string
        audio_ids:
          type: array
          items:
            type: integer
          description: |
            List of audio IDs associated with the event.
        target_system:
          type: array
          items:
            type: integer
          description: |
            List of target system IDs associated with the event. If not specified, all target systems are affected.
        start:
          type: boolean
          description: |
            Marks this event as the starting event in the series. Only one event per series may have start=true.

    ProgramStatus:
      type: object
      required:
        - running
      properties:
        running:
          type: boolean
        next_event:
          type: [object, "null"]
          description: Optional. Present only if a next event is known.
          required:
            - program_id
            - series_index
            - event_index
          properties:
            program_id:
              type: integer
            series_index:
              type: integer
            event_index:
              type: integer
        target_status:
          type: [string, "null"]
          enum: [shown, hidden]

    ProgramUpload:
      type: object
      required:
        - title
        - description
        - series
      properties:
        title:
          type: string
        description:
          type: string
        series:
          type: array
          items:
            $ref: "#/components/schemas/Series"

security:
  - {}
